services:
  frontend:
    build:
      context: ./applications/frontend
    ports:
      - "5173:5173"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ccanalytics
      POSTGRES_USER: ccadmin
      POSTGRES_PASSWORD: ccpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api-gateway:
    build:
      context: ./applications/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  auth-service:
    build:
      context: ./applications/auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ccadmin:ccpassword@postgres:5432/ccanalytics
      JWT_SECRET_KEY: SuperSecretKeyChangeMe
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
    depends_on:
      - postgres

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  analytics-service:
    build:
      context: ./applications/analytics-service
    depends_on:
      - postgres

volumes:
  postgres_data: